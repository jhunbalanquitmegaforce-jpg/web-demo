<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shop.css">
    <title>Shop</title>
</head>
<body>
    <header>
        <h1>My Shopping Store</h1>
        <div class="cart">
            cart: <span id="count">0</span>
        </div>
    </header>
    <div class="container" id="products"></div>

    <h2>Shopping Cart</h2>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cartItems"></tbody>
    </table>

    <h2>Total: P <span id="grandTotal">0</span></h2>
    <script src="shop.js"></script>
</body>
</html>
